name: Release Skills

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT
          echo "minor=$(echo $VERSION | cut -d. -f2)" >> $GITHUB_OUTPUT
          echo "patch=$(echo $VERSION | cut -d. -f3)" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump
        run: |
          MAJOR=${{ steps.version.outputs.major }}
          MINOR=${{ steps.version.outputs.minor }}
          PATCH=${{ steps.version.outputs.patch }}
          
          # Check commit messages since last release
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log $LAST_TAG..HEAD --oneline)
          fi
          
          # Check for fix commits (fix:, hotfix:, bugfix:)
          HAS_FIX=false
          for commit in $COMMITS; do
            msg=$(git log -1 --format=%s $commit)
            if echo "$msg" | grep -qiE '^(fix|hotfix|bugfix)[:\s]'; then
              HAS_FIX=true
              break
            fi
          done
          
          if [ "$HAS_FIX" = true ]; then
            # Increment patch version
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          else
            # Increment minor version
            NEW_MINOR=$((MINOR + 1))
            NEW_PATCH=0
            NEW_VERSION="$MAJOR.$NEW_MINOR.$NEW_PATCH"
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          fi
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_major=$MAJOR" >> $GITHUB_OUTPUT
          echo "new_minor=$NEW_MINOR" >> $GITHUB_OUTPUT
          echo "new_patch=$NEW_PATCH" >> $GITHUB_OUTPUT

      - name: Create packages
        run: |
          mkdir -p dist
          
          # Check if user manually set version via VERSION file change
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          # Determine the final version
          if [ -n "$LAST_TAG" ]; then
            # Check if VERSION file was changed by user
            if git diff $LAST_TAG HEAD -- VERSION | grep -q '^[+-][0-9]'; then
              # User manually changed version, use it directly
              NEW_VERSION=$(cat VERSION)
              echo "Using user-specified version: $NEW_VERSION (minor and patch reset)"
            else
              # Use auto-bumped version
              NEW_VERSION="${{ steps.bump.outputs.new_major }}.${{ steps.bump.outputs.new_minor }}.${{ steps.bump.outputs.new_patch }}"
              echo "$NEW_VERSION" > VERSION
              echo "Auto-bumped version: $NEW_VERSION"
            fi
          else
            # First release, use VERSION file as-is
            NEW_VERSION=$(cat VERSION)
            echo "First release version: $NEW_VERSION"
          fi
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Package each skill
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            
            # Create temp directory for this skill
            temp_dir=$(mktemp -d)
            
            # Copy SKILL.md to root
            if [ -f "$skill_dir/SKILL.md" ]; then
              cp "$skill_dir/SKILL.md" "$temp_dir/"
            fi
            
            # Copy all other files (excluding outputs)
            rsync -a --exclude='outputs' "$skill_dir" "$temp_dir/skill_content/"
            
            # Remove SKILL.md from subdirectory copy
            rm -f "$temp_dir/skill_content/SKILL.md"
            
            # Create zip with skill name
            cd "$temp_dir"
            zip -r "/workspace/dist/${skill_name}.zip" .
            cd -
            
            rm -rf "$temp_dir"
            echo "Created package: ${skill_name}.zip"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          version: v${{ steps.bump.outputs.new_version }}
          name: Release v${{ steps.bump.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.zip
            VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated VERSION
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}" || true
          git push || true
